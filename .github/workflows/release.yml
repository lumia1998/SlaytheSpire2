name: Release mods

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Rust GUI
        id: build_gui
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $repoRoot = $env:GITHUB_WORKSPACE
          $appRoot = Join-Path $repoRoot 'SlaytheSpire2_GUI/gui_rust/tauri-app'
          $binaryPath = Join-Path $appRoot 'src-tauri/target/release/slay-the-spire-2-mod-manager.exe'
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'mods-artifact'
          $exePath = Join-Path $artifactRoot 'SlayTheSpire2ModManager.exe'

          if (Test-Path $artifactRoot) {
            Remove-Item -Path $artifactRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          Push-Location $appRoot
          try {
            cargo install tauri-cli --version '^2' --locked
            cargo tauri build --no-bundle
          }
          finally {
            Pop-Location
          }

          if (-not (Test-Path $binaryPath)) {
            throw "GUI executable not found: $binaryPath"
          }

          Copy-Item -Path $binaryPath -Destination $exePath -Force
          "exe_path=$exePath" >> $env:GITHUB_OUTPUT

      - name: Package mods.zip
        id: package_mods
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $repoRoot = $env:GITHUB_WORKSPACE
          $stageRoot = Join-Path $env:RUNNER_TEMP 'mods-package'
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'mods-artifact'
          $zipPath = Join-Path $artifactRoot 'mods.zip'
          $excludedNames = @('.git', '.github', 'SlaytheSpire2_GUI')

          if (Test-Path $stageRoot) {
            Remove-Item -Path $stageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stageRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          Get-ChildItem -Path $repoRoot -Force | Where-Object {
            ($excludedNames -notcontains $_.Name) -and ($_.Name -notmatch '^(?i)readme(\..+)?$')
          } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $stageRoot $_.Name) -Recurse -Force
          }

          $items = Get-ChildItem -Path $stageRoot -Force
          if (-not $items) {
            throw 'The package directory is empty.'
          }

          if (Test-Path $zipPath) {
            Remove-Item -Path $zipPath -Force
          }

          Compress-Archive -Path $items.FullName -DestinationPath $zipPath -Force
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_id }}-${{ github.sha }}
          name: Auto Release #${{ github.run_number }}
          body: |
            Automated release for commit ${{ github.sha }}.
          files: |
            ${{ steps.build_gui.outputs.exe_path }}
            ${{ steps.package_mods.outputs.zip_path }}
