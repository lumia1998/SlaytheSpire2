<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slay the Spire 2 Mod Manager</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img src="./icon.png" alt="" class="sidebar-icon" />
          <span class="sidebar-title">Mod Manager</span>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-page="mods">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            <span>模组管理</span>
          </button>
          <button class="nav-item" data-page="settings">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span>设置</span>
          </button>
          <button class="nav-item" data-page="about">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span>关于</span>
          </button>
        </nav>
      </aside>

      <main class="main-content">
        <!-- 模组管理 -->
        <section class="page active" id="page-mods">
          <div class="page-scroll">
            <div class="card action-card">
              <div class="card-body">
                <div class="card-text">
                  <h3 class="card-title">备份模组</h3>
                  <p class="card-desc">备份当前模组到 mods_backup 文件夹</p>
                </div>
                <button id="backupButton" type="button" class="action-button primary-button">备份</button>
              </div>
            </div>

            <div class="card action-card">
              <div class="card-body">
                <div class="card-text">
                  <h3 class="card-title">还原模组</h3>
                  <p class="card-desc">从 mods_backup 文件夹还原</p>
                </div>
                <button id="restoreButton" type="button" class="action-button primary-button">还原</button>
              </div>
              <div class="backup-list-section">
                <div class="backup-list-header">
                  <span class="backup-list-title">备份记录</span>
                  <button id="refreshBackupsButton" type="button" class="action-button secondary-button small-button">刷新</button>
                </div>
                <div id="backupList" class="backup-list"></div>
              </div>
            </div>

            <div class="card">
              <div class="card-inner">
                <h3 class="card-title">同步模组</h3>
                <div id="syncButtonGrid" class="sync-grid"></div>
              </div>
            </div>

            <div class="card log-card">
              <div class="log-header-row">
                <span class="card-title">运行日志</span>
                <button id="clearLogButton" type="button" class="action-button secondary-button small-button">清空</button>
              </div>
              <textarea id="logOutput" class="log-output" readonly spellcheck="false"></textarea>
            </div>
          </div>
        </section>

        <!-- 设置 -->
        <section class="page" id="page-settings">
          <div class="page-scroll">
            <div class="card">
              <div class="card-inner">
                <h3 class="card-title">游戏目录</h3>
                <div class="path-row">
                  <input
                    id="gamePath"
                    type="text"
                    class="text-input"
                    placeholder="例如 E:\Steam\steamapps\common\Slay the Spire 2"
                    autocomplete="off"
                  />
                  <button id="savePathButton" type="button" class="action-button secondary-button">选择路径</button>
                  <button id="openDirectoryButton" type="button" class="action-button secondary-button">打开目录</button>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-inner">
                <h3 class="card-title">同步源</h3>
                <div id="repoList" class="repo-list"></div>
                <button id="addRepoButton" type="button" class="action-button secondary-button add-repo-button">添加</button>
              </div>
            </div>

            <div class="card">
              <div class="card-inner">
                <div class="common-mods-header">
                  <div>
                    <h3 class="card-title">公共模组</h3>
                    <p class="card-desc">mods_common 里的内容会在每次同步后自动复制并覆盖到 mods</p>
                  </div>
                  <div class="common-mods-actions">
                    <button id="openCommonModsButton" type="button" class="action-button secondary-button small-button">打开目录</button>
                    <button id="addCommonModButton" type="button" class="action-button secondary-button small-button">添加当前模组</button>
                    <button id="refreshCommonModsButton" type="button" class="action-button secondary-button small-button">刷新</button>
                  </div>
                </div>
                <div id="commonModsList" class="backup-list"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- 关于 -->
        <section class="page" id="page-about">
          <div class="page-scroll">
            <div class="card">
              <div class="card-inner about-content">
                <img src="./icon.png" alt="" class="about-icon" />
                <h2 class="about-title">Slay the Spire 2 Mod Manager</h2>
                <p class="about-version">v1.0.0</p>
                <div class="about-links">
                  <a id="linkGithub" href="#" class="about-link">
                    <svg class="about-link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    <span>项目主页</span>
                  </a>
                  <a id="linkIssue" href="#" class="about-link">
                    <svg class="about-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span>问题反馈</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
